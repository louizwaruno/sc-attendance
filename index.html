<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STC Check-in</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 85%;
      text-align: center;
    }
    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }
    .btn-in           { background: #28a745; }
    .btn-in:disabled  { background: #28a745; opacity: 0.45; cursor: not-allowed; }
    .btn-out          { background: #dc3545; }
    .btn-out:disabled { background: #dc3545; opacity: 0.45; cursor: not-allowed; }
    #status {
      margin-top: 20px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- hidden iframe รับ response จาก Apps Script (ไม่แสดงผล) -->
  <iframe id="hidden-frame" name="hidden-frame" style="display:none;"></iframe>

  <!-- hidden form ส่งข้อมูลผ่าน GET ไป Apps Script -->
  <form id="data-form"
        method="GET"
        target="hidden-frame"
        style="display:none;">
    <input type="hidden" id="f-status" name="status">
    <input type="hidden" id="f-name"   name="name">
    <input type="hidden" id="f-userId" name="userId">
    <input type="hidden" id="f-lat"    name="lat">
    <input type="hidden" id="f-lng"    name="lng">
  </form>

  <div class="card">
    <h2 id="user-greet">STC Check-in</h2>
    <button id="btn-in"  class="btn btn-in"  onclick="saveData('เข้างาน')" disabled>📍 ลงเวลาเข้างาน</button>
    <button id="btn-out" class="btn btn-out" onclick="saveData('ออกงาน')" disabled>🕒 ลงเวลาออกงาน</button>
    <div id="status">⏳ กำลังเริ่มต้นระบบ...</div>
  </div>

  <script>
    var LIFF_ID     = "2009523027-LK7qvomM";
    var BACKEND_URL = "https://script.google.com/macros/s/AKfycbxlNJbddADBkW2ra4jb6BywSFSGVYl7DhUVzeb2bOhwSBnOxVF-Xtjple89v2IWkIyz/exec";

    var userProfile = null;

    function setStatus(msg) {
      document.getElementById('status').innerHTML = msg;
    }
    function enableButtons() {
      document.getElementById('btn-in').disabled  = false;
      document.getElementById('btn-out').disabled = false;
    }
    function disableButtons() {
      document.getElementById('btn-in').disabled  = true;
      document.getElementById('btn-out').disabled = true;
    }

    async function main() {
      try {
        setStatus("⏳ กำลังเชื่อมต่อ LINE...");
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          setStatus("🔐 กำลัง Login LINE...");
          liff.login();
          return;
        }

        setStatus("👤 กำลังดึงข้อมูลผู้ใช้...");
        userProfile = await liff.getProfile();

        document.getElementById('user-greet').innerText = "สวัสดีคุณ " + userProfile.displayName;
        setStatus("✅ พร้อมบันทึกพิกัด GPS แล้วครับ");
        enableButtons();

      } catch (err) {
        setStatus("<span style='color:red'>❌ LIFF Error: " + err.message + "</span>");
      }
    }

    function submitForm(type, lat, lng) {
      // ตั้งค่า action ของ form
      var form = document.getElementById('data-form');
      form.action = BACKEND_URL;

      // ใส่ข้อมูลลงใน hidden inputs
      document.getElementById('f-status').value = type;
      document.getElementById('f-name').value   = userProfile.displayName;
      document.getElementById('f-userId').value = userProfile.userId;
      document.getElementById('f-lat').value    = lat;
      document.getElementById('f-lng').value    = lng;

      // submit ผ่าน hidden iframe — ไม่กระทบหน้าเว็บเลย
      form.submit();
    }

    function saveData(type) {
      if (!userProfile) {
        setStatus("<span style='color:red'>❌ ยังไม่ได้ Login กรุณารอสักครู่</span>");
        return;
      }

      disableButtons();
      setStatus("📡 กำลังตรวจสอบพิกัด GPS...");

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          setStatus("💾 กำลังบันทึกข้อมูล...");

          submitForm(type, pos.coords.latitude, pos.coords.longitude);

          // รอ 3 วินาที แล้วแสดงผลสำเร็จ
          setTimeout(function() {
            setStatus("<b style='color:green'>✅ บันทึกสำเร็จ! กำลังปิดหน้าต่าง...</b>");
            setTimeout(function() { liff.closeWindow(); }, 2000);
          }, 3000);
        },
        function(err) {
          setStatus("<span style='color:red'>❌ GPS Error: " + err.message + "<br>กรุณาเปิด GPS ในมือถือก่อนครับ</span>");
          enableButtons();
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    main();
  </script>
</body>
</html>
